<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>午餐审判庭 · 随机轮值</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #1a1a1a 0%, #2d2a26 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: #fffaf2;
            border-radius: 56px;
            box-shadow: 0 30px 45px -18px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(115deg, #d45a38, #a83617);
            padding: 1.6rem 1.5rem 1.2rem;
            text-align: center;
            color: white;
        }
        .header h1 {
            margin: 0;
            font-size: 1.9rem;
        }
        .cruel-tip {
            background: #2c1f17;
            display: inline-block;
            margin-top: 12px;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #ffc7a4;
        }
        .lottery-area {
            padding: 32px 20px 24px;
            background: #fffbf5;
        }
        .sync-badge {
            background: #ece1d4;
            border-radius: 40px;
            padding: 5px 14px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #b25630;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .online-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        .today-picker-highlight {
            background: #fef0e6;
            border: 2px dashed #dd6b42;
            border-radius: 16px;
            padding: 10px 16px;
            margin: 8px 0 12px;
            text-align: center;
            font-size: 1.1rem;
        }
        .today-picker-highlight strong {
            color: #dd6b42;
            font-size: 1.4rem;
        }
        .result-glass {
            background: white;
            border-radius: 48px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
            padding: 24px 12px;
            text-align: center;
            margin: 8px 0 16px;
        }
        .result-label {
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: #be7652;
            font-weight: 600;
        }
        .result-person {
            font-size: 1.8rem;
            font-weight: 700;
            background: #fff0e6;
            display: inline-block;
            padding: 6px 28px;
            border-radius: 60px;
            margin: 10px 0 6px;
            color: #bc4e2a;
        }
        .result-name {
            font-size: 2.2rem;
            font-weight: 800;
            color: #2d241d;
            margin: 12px 0 6px;
        }
        .result-name.highlight-avoid {
            color: #d45a38;
            text-decoration: line-through;
        }
        .btn {
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            transition: transform 0.1s;
        }
        .btn-primary {
            background: #dd6b42;
            color: white;
            box-shadow: 0 8px 16px -8px #c2512d;
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .btn-primary:disabled {
            background: #c2a088;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .btn-secondary {
            background: #e8dcd0;
            color: #5a4030;
        }
        .btn-secondary:active {
            transform: scale(0.97);
        }
        .history-section {
            background: #fff7ef;
            padding: 16px 20px 24px;
            border-top: 1px solid #f3e3d4;
        }
        .section-title {
            font-weight: 700;
            color: #61412e;
            margin-bottom: 16px;
            border-left: 5px solid #dd6b42;
            padding-left: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 280px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .history-item {
            background: white;
            border-radius: 60px;
            padding: 10px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #f0ddcc;
        }
        .history-date {
            background: #efe1d4;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .history-info {
            flex: 1;
            margin: 0 12px;
        }
        .history-info .avoid-badge {
            background: #fde8e8;
            color: #b91c1c;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 6px;
            font-weight: 600;
        }
        .live-tip {
            background: #2c241e;
            color: #fad6bc;
            border-radius: 28px;
            padding: 8px 16px;
            font-size: 0.7rem;
            text-align: center;
            margin-top: 12px;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #c2a07e;
            background: #fff7ef;
            padding: 12px 0 20px;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .status-ok {
            background: #e6f7e6;
            color: #1a7a1a;
            padding: 12px 16px;
            border-radius: 12px;
            margin: 10px 0;
            font-size: 0.85rem;
            border-left: 4px solid #1a7a1a;
            text-align: left;
        }
        .status-error {
            background: #fde8e8;
            color: #b91c1c;
            padding: 12px 16px;
            border-radius: 12px;
            margin: 10px 0;
            font-size: 0.85rem;
            border-left: 4px solid #b91c1c;
            text-align: left;
        }
        .status-info {
            background: #e8f0fe;
            color: #1a5a7a;
            padding: 12px 16px;
            border-radius: 12px;
            margin: 10px 0;
            font-size: 0.85rem;
            border-left: 4px solid #1a5a7a;
            text-align: left;
        }
        .status-warning {
            background: #fff3e6;
            color: #b85a1a;
            padding: 12px 16px;
            border-radius: 12px;
            margin: 10px 0;
            font-size: 0.85rem;
            border-left: 4px solid #dd6b42;
            text-align: left;
        }
        @media (max-width: 500px) {
            .result-name {
                font-size: 1.7rem;
            }
            .result-person {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚖️ 午餐审判庭 🍜</h1>
            <div class="cruel-tip">⚠️ 抽到不想吃的，含泪也要吃！ ⚠️</div>
        </div>
        <div class="lottery-area">
            <div class="sync-badge">
                <span class="online-dot"></span> 🌐 云端同步 · 全员一致 🌐
            </div>

            <div class="today-picker-highlight">
                🎯 今日执剑人：<strong id="todayPickerName">加载中...</strong>
            </div>

            <div class="result-glass">
                <div class="result-label">今日·命中午餐</div>
                <div class="result-name" id="restaurantDisplay">🥘 等待抽选</div>
                <div style="margin-top: 10px; font-size: 0.85rem; color: #a08068;">
                    由 <strong id="pickerDisplay">—</strong> 执剑
                </div>
                <div id="reDrawHint" style="margin-top: 8px; font-size: 0.8rem; color: #d45a38; display: none;">
                    🔄 抽到「寻味江西」或「巫山纸包鱼」可重新抽选！
                </div>
            </div>

            <div style="display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;">
                <button class="btn btn-primary" id="drawBtn">🔮 今日 · 开饭抽签 🔮</button>
                <button class="btn btn-secondary" id="reDrawBtn" style="display:none;">🔄 重新抽签</button>
            </div>
            <div id="statusDisplay"></div>
            <div class="live-tip">
                💢 每天自动随机一位点餐官（7天内不重复） · 餐厅七天内不重样 · 每日仅可抽选一次<br>
                🚫 已取消「三江烩面」 · 抽到「寻味江西」「巫山纸包鱼」可重新抽选一次
            </div>
        </div>
        <div class="history-section">
            <div class="section-title">
                📋 过往裁决录（不可清除）
                <span style="font-size: 12px;">🏆 云端永久存储</span>
            </div>
            <div id="historyContainer">
                <ul class="history-list" id="historyList">
                    <div class="empty-history">🔄 同步数据中...</div>
                </ul>
            </div>
        </div>
        <footer>🔒 数据存储于云端 · 每日自动随机点餐官（7天不重复） · 所有人完全同步</footer>
    </div>

    <script>
        // ============================================================
        // 🚨 请替换成你自己的 Supabase 配置！
        // ============================================================
       var SUPABASE_URL = "https://ejlqgnhimnnaavwylcvi.supabase.co"; // 👈 替换这里
        var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbHFnbmhpbW5uYWF2d3lsY3ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1ODIzODMsImV4cCI6MjA5NzE1ODM4M30.XEdLs2SXAXhmxUeTEcvbglZD-sKZ_gSploT1OFVPGC8"; // 👈 替换这里

        // ============================================================

        if (SUPABASE_URL.indexOf("你的项目") !== -1 || SUPABASE_ANON_KEY.indexOf("你的anon") !== -1) {
            document.getElementById("statusDisplay").innerHTML =
                '<div class="status-error">⚠️ 请先配置 Supabase 密钥！<br><small>在代码开头替换 SUPABASE_URL 和 SUPABASE_ANON_KEY</small></div>';
            document.getElementById("todayPickerName").innerText = "⚠️ 配置缺失";
            throw new Error("请先配置 Supabase 密钥");
        }

        // ============================================================
        // 🍽️ 餐厅列表（已移除「三江烩面」）
        // ============================================================
        var FULL_RESTAURANT_LIST = [
            "漫柏沙县", "妯娌", "KFC", "正记", "忆面记", "锦海鸡公煲", "锦海陕西面馆",
            "锦海锅贴", "胖妹", "漫柏猪脚饭", "三江沙县", "天福麻辣烫", "漫柏烤肉饭",
            "小湖兰州拉面", "漫泊木桶饭", "漫泊麻辣香锅", "巫山纸包鱼",
            "寻味江西", "王家食堂", "麦当劳", "捡角"
        ];

        // ⚠️ 抽到这些餐厅需要重新抽选
        var AVOID_RESTAURANTS = ["寻味江西", "巫山纸包鱼"];

        var PERSONS = ["陈鹏", "晨曦", "淑静", "王辰"];
        var RECENT_DAYS_LIMIT = 7;

        var supabaseClient = null;
        var isDrawing = false;
        var isInitialized = false;
        var currentDrawResult = null; // 存储当前抽选结果，用于重新抽选

        function getTodayStr() {
            return new Date().toISOString().slice(0, 10);
        }

        function showStatus(message, type) {
            type = type || 'info';
            var el = document.getElementById("statusDisplay");
            if (el) {
                var className = type === 'error' ? 'status-error' : type === 'ok' ? 'status-ok' : type === 'warning' ?
                    'status-warning' : 'status-info';
                el.innerHTML = '<div class="' + className + '">' + message + '</div>';
            }
        }

        // ============ 随机选择执剑人（7天内不重复）============
        function selectRandomPicker(historyRecords) {
            var today = getTodayStr();

            var limitDate = new Date();
            limitDate.setDate(limitDate.getDate() - RECENT_DAYS_LIMIT);

            var recentPickers = {};
            for (var i = 0; i < historyRecords.length; i++) {
                var rec = historyRecords[i];
                var recDate = new Date(rec.date);
                if (recDate >= limitDate && rec.date !== today) {
                    recentPickers[rec.picker] = true;
                }
            }

            var available = [];
            for (var j = 0; j < PERSONS.length; j++) {
                if (!recentPickers[PERSONS[j]]) {
                    available.push(PERSONS[j]);
                }
            }

            if (available.length === 0) {
                available = PERSONS.slice();
            }

            var randomIndex = Math.floor(Math.random() * available.length);
            return available[randomIndex];
        }

        // ============ 选择餐厅（排除黑名单）============
        function selectRestaurant(historyRecords, excludeRestaurant) {
            var today = getTodayStr();
            var limitDate = new Date();
            limitDate.setDate(limitDate.getDate() - RECENT_DAYS_LIMIT);

            var blacklist = {};
            for (var i = 0; i < historyRecords.length; i++) {
                var rec = historyRecords[i];
                var recDate = new Date(rec.date);
                if (recDate >= limitDate && rec.date !== today) {
                    blacklist[rec.restaurant] = true;
                }
            }

            // 如果要排除某个餐厅（用于重新抽选）
            if (excludeRestaurant) {
                blacklist[excludeRestaurant] = true;
            }

            var available = [];
            for (var j = 0; j < FULL_RESTAURANT_LIST.length; j++) {
                var r = FULL_RESTAURANT_LIST[j];
                if (!blacklist[r]) {
                    available.push(r);
                }
            }

            // 如果可用列表为空（极端情况），去掉所有黑名单限制
            if (available.length === 0) {
                available = FULL_RESTAURANT_LIST.slice();
                if (excludeRestaurant) {
                    available = available.filter(function(r) { return r !== excludeRestaurant; });
                }
                if (available.length === 0) {
                    available = FULL_RESTAURANT_LIST.slice();
                }
            }

            var randomIndex = Math.floor(Math.random() * available.length);
            return available[randomIndex];
        }

        // ============ Supabase 操作 ============
        function fetchAllRecords() {
            return supabaseClient
                .from('lunch_records')
                .select('*')
                .order('date', { ascending: true })
                .then(function(result) {
                    if (result.error) {
                        console.error("获取记录失败:", result.error);
                        return [];
                    }
                    return result.data || [];
                });
        }

        function fetchTodayRecord() {
            var today = getTodayStr();
            return supabaseClient
                .from('lunch_records')
                .select('*')
                .eq('date', today)
                .maybeSingle()
                .then(function(result) {
                    if (result.error && result.error.code !== 'PGRST116') {
                        console.error("查询今日记录失败:", result.error);
                        return null;
                    }
                    return result.data;
                });
        }

        function deleteTodayRecord() {
            var today = getTodayStr();
            return supabaseClient
                .from('lunch_records')
                .delete()
                .eq('date', today)
                .then(function(result) {
                    if (result.error) {
                        console.error("删除今日记录失败:", result.error);
                        return false;
                    }
                    return true;
                });
        }

        // ============ 执行抽选 ============
        function performDraw(avoidRestaurant) {
            if (isDrawing) {
                return Promise.resolve({ success: false, message: "抽选中，请勿重复点击" });
            }
            isDrawing = true;

            return fetchTodayRecord()
                .then(function(existing) {
                    if (existing) {
                        isDrawing = false;
                        return {
                            success: false,
                            alreadyExists: true,
                            picker: existing.picker,
                            restaurant: existing.restaurant
                        };
                    }
                    return fetchAllRecords();
                })
                .then(function(allRecords) {
                    if (allRecords.success !== undefined) {
                        return allRecords;
                    }

                    var todayPicker = selectRandomPicker(allRecords);
                    var restaurant = selectRestaurant(allRecords, avoidRestaurant || null);

                    currentDrawResult = {
                        picker: todayPicker,
                        restaurant: restaurant
                    };

                    return supabaseClient.from('lunch_records').insert([{
                        date: getTodayStr(),
                        picker: todayPicker,
                        restaurant: restaurant
                    }]).then(function(result) {
                        if (result.error) {
                            if (result.error.code === '23505') {
                                return fetchTodayRecord().then(function(latest) {
                                    isDrawing = false;
                                    if (latest) {
                                        return {
                                            success: false,
                                            alreadyExists: true,
                                            picker: latest.picker,
                                            restaurant: latest.restaurant
                                        };
                                    }
                                    return { success: false, message: result.error.message };
                                });
                            }
                            isDrawing = false;
                            showStatus("❌ 插入失败: " + result.error.message, 'error');
                            return { success: false, message: result.error.message };
                        }

                        isDrawing = false;

                        // 检查是否抽到需要重新抽选的餐厅
                        var isAvoid = AVOID_RESTAURANTS.indexOf(restaurant) !== -1;

                        if (isAvoid) {
                            showStatus("⚠️ 抽到了「" + restaurant + "」，可点击「重新抽签」再抽一次！", 'warning');
                        } else {
                            showStatus("✅ 抽选成功！今日由 " + todayPicker + " 决定吃 " + restaurant, 'ok');
                        }

                        return {
                            success: true,
                            picker: todayPicker,
                            restaurant: restaurant,
                            isAvoid: isAvoid
                        };
                    });
                })
                .catch(function(err) {
                    isDrawing = false;
                    showStatus("❌ 异常: " + err.message, 'error');
                    return { success: false, message: err.message };
                });
        }

        // ============ 执行重新抽选 ============
        function performReDraw() {
            if (isDrawing) {
                return Promise.resolve({ success: false, message: "抽选中，请勿重复点击" });
            }

            // 检查今天是否有记录
            return fetchTodayRecord()
                .then(function(existing) {
                    if (!existing) {
                        return { success: false, message: "今日尚无记录，请先抽选" };
                    }

                    // 检查今天的餐厅是否是需要规避的
                    if (AVOID_RESTAURANTS.indexOf(existing.restaurant) === -1) {
                        return {
                            success: false,
                            message: "「" + existing.restaurant + "」不需要重新抽选"
                        };
                    }

                    isDrawing = true;

                    // 删除今天的记录
                    return deleteTodayRecord()
                        .then(function(deleted) {
                            if (!deleted) {
                                isDrawing = false;
                                return { success: false, message: "删除记录失败" };
                            }

                            // 重新抽选（排除当前餐厅）
                            return fetchAllRecords()
                                .then(function(allRecords) {
                                    var todayPicker = selectRandomPicker(allRecords);
                                    var restaurant = selectRestaurant(allRecords, existing.restaurant);

                                    currentDrawResult = {
                                        picker: todayPicker,
                                        restaurant: restaurant
                                    };

                                    return supabaseClient.from('lunch_records').insert([{
                                        date: getTodayStr(),
                                        picker: todayPicker,
                                        restaurant: restaurant
                                    }]).then(function(result) {
                                        isDrawing = false;

                                        if (result.error) {
                                            showStatus("❌ 重新抽选失败: " + result.error.message,
                                            'error');
                                            return { success: false, message: result.error
                                                    .message };
                                        }

                                        var isAvoid = AVOID_RESTAURANTS.indexOf(restaurant) !== -1;

                                        if (isAvoid) {
                                            showStatus("⚠️ 又抽到了「" + restaurant +
                                                "」，可再次点击「重新抽签」！", 'warning');
                                        } else {
                                            showStatus("✅ 重新抽选成功！今日由 " + todayPicker +
                                                " 决定吃 " + restaurant, 'ok');
                                        }

                                        return {
                                            success: true,
                                            picker: todayPicker,
                                            restaurant: restaurant,
                                            isAvoid: isAvoid
                                        };
                                    });
                                });
                        });
                })
                .catch(function(err) {
                    isDrawing = false;
                    showStatus("❌ 重新抽选异常: " + err.message, 'error');
                    return { success: false, message: err.message };
                });
        }

        // ============ 渲染界面 ============
        function renderUI() {
            return fetchTodayRecord()
                .then(function(todayRecord) {
                    return fetchAllRecords().then(function(allRecords) {
                        var todayPicker;

                        if (todayRecord) {
                            todayPicker = todayRecord.picker;
                        } else {
                            todayPicker = selectRandomPicker(allRecords);
                        }

                        document.getElementById("todayPickerName").innerText = todayPicker;

                        var pickerSpan = document.getElementById("pickerDisplay");
                        var restaurantSpan = document.getElementById("restaurantDisplay");
                        var reDrawHint = document.getElementById("reDrawHint");
                        var reDrawBtn = document.getElementById("reDrawBtn");

                        if (todayRecord) {
                            pickerSpan.innerText = todayRecord.picker;
                            restaurantSpan.innerText = todayRecord.restaurant;

                            // 检查是否需要显示重新抽选按钮
                            var isAvoid = AVOID_RESTAURANTS.indexOf(todayRecord.restaurant) !== -1;
                            if (isAvoid) {
                                reDrawHint.style.display = "block";
                                reDrawBtn.style.display = "inline-block";
                                restaurantSpan.className = "result-name highlight-avoid";
                            } else {
                                reDrawHint.style.display = "none";
                                reDrawBtn.style.display = "none";
                                restaurantSpan.className = "result-name";
                            }
                        } else {
                            pickerSpan.innerText = "⏳ 等待抽选";
                            restaurantSpan.innerText = "❄️ 今日尚未抽选";
                            restaurantSpan.className = "result-name";
                            reDrawHint.style.display = "none";
                            reDrawBtn.style.display = "none";
                        }

                        var historyList = document.getElementById("historyList");
                        if (!allRecords || allRecords.length === 0) {
                            historyList.innerHTML = '<div class="empty-history">🍃 暂无用餐记录，召唤第一签</div>';
                            return;
                        }

                        var today = getTodayStr();
                        var reversed = allRecords.slice().reverse();
                        var html = '';
                        for (var i = 0; i < reversed.length; i++) {
                            var rec = reversed[i];
                            var dateObj = new Date(rec.date);
                            var displayDate = (dateObj.getMonth() + 1) + '/' + dateObj.getDate();
                            var isToday = rec.date === today;
                            var isAvoid = AVOID_RESTAURANTS.indexOf(rec.restaurant) !== -1;
                            html +=
                                '<li class="history-item">' +
                                '<span class="history-date">' + displayDate + '</span>' +
                                '<span class="history-info">👤 <strong>' + rec.picker + '</strong> 执剑 · 🍚 ' + rec
                                .restaurant +
                                (isAvoid ? ' <span class="avoid-badge">⚠️ 重新抽过</span>' : '') +
                                '</span>' +
                                '<span style="font-size: 11px; background:#f2e1d2; padding:2px 10px; border-radius:20px;">' +
                                (isToday ? '今日判决' : '') + '</span>' +
                                '</li>';
                        }
                        historyList.innerHTML = html;
                    });
                })
                .catch(function(err) {
                    console.error("渲染界面失败:", err);
                });
        }

        // ============ 抽签点击 ============
        function onDrawClick() {
            var btn = document.getElementById("drawBtn");
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 抽签中...';

            performDraw(null).then(function(result) {
                btn.disabled = false;
                btn.innerHTML = '🔮 今日 · 开饭抽签 🔮';

                if (!result.success && result.alreadyExists) {
                    renderUI();
                    alert('⛔ 今日已经抽选过啦！\n点餐官：' + result.picker + '\n午餐：' + result.restaurant +
                        '\n抽到不想吃的，含泪也要吃！');
                    return;
                }

                if (result.success) {
                    renderUI();

                    if (result.isAvoid) {
                        alert('⚠️ 抽到了「' + result.restaurant + '」\n\n点击「重新抽签」再抽一次！');
                    } else {
                        alert('🍢 天命已定 🍢\n今日执剑人：' + result.picker + '\n今日午餐：' + result.restaurant +
                            '\n\n「抽到不想吃的，含泪也要吃！」');
                    }
                } else {
                    alert('❌ 抽选失败: ' + (result.message || "未知错误"));
                }
            });
        }

        // ============ 重新抽签点击 ============
        function onReDrawClick() {
            var btn = document.getElementById("reDrawBtn");
            var mainBtn = document.getElementById("drawBtn");
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 重抽中...';
            mainBtn.disabled = true;

            performReDraw().then(function(result) {
                btn.disabled = false;
                btn.innerHTML = '🔄 重新抽签';
                mainBtn.disabled = false;

                if (result.success) {
                    renderUI();

                    if (result.isAvoid) {
                        alert('⚠️ 又抽到了「' + result.restaurant + '」\n\n点击「重新抽签」再抽一次！');
                    } else {
                        alert('🍢 重新抽选成功 🍢\n今日执剑人：' + result.picker + '\n今日午餐：' + result.restaurant +
                            '\n\n「抽到不想吃的，含泪也要吃！」');
                    }
                } else {
                    alert('❌ 重新抽选失败: ' + (result.message || "未知错误"));
                }
            });
        }

        // ============ 实时订阅 ============
        function subscribeToChanges() {
            var channel = supabaseClient
                .channel('lunch_records_sync')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'lunch_records' }, function() {
                    console.log("📡 检测到云端变化，刷新界面");
                    renderUI();
                })
                .subscribe(function(status) {
                    console.log("订阅状态:", status);
                });
            return channel;
        }

        // ============ 初始化 ============
        function initApp() {
            if (isInitialized) return;

            if (typeof window.supabase === 'undefined') {
                showStatus("⏳ 正在加载 Supabase 库...", 'info');
                var checkInterval = setInterval(function() {
                    if (typeof window.supabase !== 'undefined') {
                        clearInterval(checkInterval);
                        initApp();
                    }
                }, 200);
                setTimeout(function() {
                    clearInterval(checkInterval);
                    if (!isInitialized) {
                        showStatus("❌ 库加载超时，请刷新页面", 'error');
                    }
                }, 10000);
                return;
            }

            isInitialized = true;
            showStatus("🔗 正在连接云端...", 'info');

            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                supabaseClient.from('lunch_records').select('count', { count: 'exact', head: true })
                    .then(function(result) {
                        if (result.error) {
                            showStatus("⚠️ 表访问异常: " + result.error.message + "，请确认表已创建", 'error');
                        } else {
                            showStatus("✅ 云端连接正常，数据实时同步中", 'ok');
                        }
                    })
                    .catch(function(err) {
                        showStatus("⚠️ 连接异常: " + err.message, 'error');
                    });

                renderUI();
                subscribeToChanges();

                document.getElementById("drawBtn").addEventListener("click", onDrawClick);
                document.getElementById("reDrawBtn").addEventListener("click", onReDrawClick);

            } catch (err) {
                showStatus("❌ 初始化失败: " + err.message, 'error');
                console.error("初始化失败:", err);
            }
        }

        // ============ 启动 ============
        (function loadSupabase() {
            if (typeof window.supabase !== 'undefined') {
                initApp();
                return;
            }
            var script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
            script.onload = function() {
                console.log("✅ Supabase 库加载完成");
                initApp();
            };
            script.onerror = function() {
                showStatus("❌ 无法加载 Supabase 库，请检查网络", 'error');
            };
            document.head.appendChild(script);
        })();

        setTimeout(function() {
            if (!isInitialized && typeof window.supabase !== 'undefined') {
                console.log("⏰ 超时触发初始化");
                initApp();
            }
        }, 3000);
    </script>
</body>

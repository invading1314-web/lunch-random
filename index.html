<html lang="zh-CN">
<head>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0d0d0d;
            color: #f5e8d8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 16px;
        }

        .app {
            max-width: 440px;
            width: 100%;
            background: #141414;
            border-radius: 32px;
            padding: 16px 16px 24px;
            border: 1px solid #2a2a2a;

        }

        .app-header {
            text-align: center;
            padding: 4px 0 10px;
        }
        .app-header .emoji-deco {
            font-size: 32px;
            display: block;
            margin-bottom: 2px;
        }
        .app-header h1 {
            font-size: 30px;
            font-weight: 900;
            background: linear-gradient(135deg, #f5e8d8 0%, #d45a38 60%, #f5e8d8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        .app-header .slogan {
            font-size: 14px;
            color: #a08068;
            margin-top: 4px;
            font-weight: 500;
            min-height: 24px;
            background: #1a1a1a;
            padding: 4px 16px;
            border-radius: 20px;
            display: inline-block;
            border: 1px solid #2a2a2a;
        }

        .picker-section {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 16px 18px 18px;
            margin-bottom: 14px;
            border: 1px solid #2a2a2a;
        }
        .picker-section .section-label {
            font-size: 12px;
            font-weight: 700;
            color: #a08068;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .picker-grid {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .picker-item {
            flex: 1;
            min-width: 56px;
            padding: 10px 4px 8px;
            background: #222;
            border-radius: 14px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #8a7a6a;
            transition: all 0.3s;
            border: 2px solid transparent;
            cursor: default;
            position: relative;
        }
        .picker-item .avatar {
            display: block;
            font-size: 28px;
            margin-bottom: 2px;
        }
        .picker-item .name {
            display: block;
            font-size: 12px;
        }
        .picker-item .badge {
            display: inline-block;
            font-size: 8px;
            background: rgba(212, 90, 56, 0.2);
            color: #d45a38;
            padding: 1px 8px;
            border-radius: 10px;
            margin-top: 2px;
        }
        .picker-item.active {
            background: #2a1a14;
            border-color: #d45a38;
            color: #f5e8d8;
            box-shadow: 0 0 30px rgba(212, 90, 56, 0.15);
        }
        .picker-item.active .badge {
            background: #d45a38;
            color: white;
        }
        .picker-item.locked::after {
            content: '🔒';
            position: absolute;
            top: -6px;
            right: -4px;
            font-size: 12px;
        }

        .picker-status {
            margin-top: 12px;
            text-align: center;
            font-size: 15px;
            color: #d45a38;
            font-weight: 700;
            background: #1a0e0a;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid #2a1a14;
        }
        .picker-status .highlight {
            font-size: 20px;
            color: #f5e8d8;
        }
        .picker-status .glow {
            animation: pulse-glow 1.5s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%,
            100% {
                text-shadow: 0 0 10px rgba(212, 90, 56, 0.2);
            }
            50% {
                text-shadow: 0 0 30px rgba(212, 90, 56, 0.5);
            }
        }

        .restaurant-section {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 16px 18px 14px;
            margin-bottom: 14px;
            border: 1px solid #2a2a2a;
        }
        .restaurant-section .section-label {
            font-size: 12px;
            font-weight: 700;
            color: #a08068;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .restaurant-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .restaurant-tag {
            padding: 5px 12px;
            background: #222;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            color: #b8a890;
            border: 1px solid transparent;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .restaurant-tag .del-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: transparent;
            color: #4a3a2a;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            transition: 0.2s;
            padding: 0;
            line-height: 1;
            margin-left: 2px;
        }
        .restaurant-tag .del-btn:hover {
            background: #d45a38;
            color: white;
            transform: scale(1.2);
        }
        .restaurant-tag.used {
            color: #4a3a2a;
            text-decoration: line-through;
            background: #181818;
            opacity: 0.6;
        }
        .restaurant-tag.active {
            background: #d45a38;
            color: white;
            border-color: #d45a38;
            box-shadow: 0 0 30px rgba(212, 90, 56, 0.25);
            transform: scale(1.05);
        }

            gap: 8px;

            align-items: center;

        .restaurant-add input {

            background: #111;

            outline: none;

            font-family: inherit;

        }
        .restaurant-add input:focus {

        }

            border: none;
            border-radius: 20px;
            font-weight: 700;

            transition: 0.2s;
            font-family: inherit;

            border: none;

        }
        .fate-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 60%);

        @keyframes rotate-bg {
            0% {

            }
            100% {
                transform: rotate(360deg);
            }

        .fate-btn:active {
            transform: scale(0.96);
        }
        .fate-btn:disabled {
            opacity: 0.4;

            transform: none;
        }

            font-weight: 400;
            opacity: 0.7;
            display: block;
            margin-top: 2px;
            letter-spacing: 1px;

        }
        @keyframes dance {

            100% {
                transform: rotate(-5deg) scale(1);
            }
            50% {
                transform: rotate(5deg) scale(1.1);
            }
        }

        .result-section {

            border-radius: 20px;
            padding: 16px 18px 14px;
            margin-bottom: 14px;
            border: 1px solid #2a2a2a;

            font-weight: 700;

            letter-spacing: 3px;

            color: #f5b88a;
        }
        .result-section .result-content .big-emoji {
            font-size: 28px;
            display: block;
            margin-bottom: 2px;
        }

            color: #6a5a4a;
            font-weight: 500;
            padding: 6px 12px;
            background: #111;
            border-radius: 12px;
            display: inline-block;
            margin-top: 4px;
            border: 1px solid #222;
        }

            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.2;
            }
        }

        .history-section {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 16px 18px 14px;
            border: 1px solid #2a2a2a;
        }
        .history-section .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .history-section .section-header .section-label {
            font-size: 12px;
            font-weight: 700;
            color: #a08068;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .history-section .section-header .clear-btn {
            font-size: 11px;
            color: #4a3a2a;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 12px;
            transition: 0.2s;
            border: 1px solid #2a2a2a;
        }
        .history-section .section-header .clear-btn:hover {
            color: #d45a38;
            border-color: #d45a38;
        }
        .history-list {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #111;
            border-radius: 12px;
            font-size: 13px;
            border: 1px solid #1a1a1a;
        }
        .history-item .date {
            font-size: 11px;
            color: #4a3a2a;
            font-weight: 600;
            min-width: 40px;
        }
        .history-item .info {
            flex: 1;
            margin: 0 8px;
            font-weight: 500;
            color: #b8a890;
        }
        .history-item .info .picker {
            color: #d45a38;
        }
        .history-item .info .resto {
            color: #f5b88a;
        }

            background: #d45a38;
            color: white;
            padding: 1px 10px;
            border-radius: 10px;
            font-weight: 700;
        }
        .history-empty {
            text-align: center;
            color: #4a3a2a;
            padding: 16px 0;
            font-size: 13px;
        }

        .history-list::-webkit-scrollbar {
            width: 3px;
        }
        .history-list::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 4px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: #3a2a1a;
            border-radius: 4px;
        }

        @media (max-width: 400px) {
            .picker-item {
                min-width: 46px;
                padding: 8px 2px 6px;

            }
            .picker-item .avatar {

            .result-section .result-content {
                font-size: 15px;
            }
            .fate-btn {
                font-size: 18px;
                padding: 14px 12px;
            }
        }

        .funny-deco {
            font-size: 10px;
            color: #2a2a2a;
            text-align: center;
            margin-top: 12px;
            letter-spacing: 4px;
        }
        .funny-deco span {
            display: inline-block;
            animation: float 2s ease-in-out infinite;
        }
        .funny-deco span:nth-child(2) {
            animation-delay: 0.3s;
        }
        .funny-deco span:nth-child(3) {
            animation-delay: 0.6s;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-4px);
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a1a14;
            color: #f5e8d8;
            padding: 10px 24px;
            border-radius: 16px;
            font-size: 14px;
            border: 1px solid #d45a38;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            z-index: 999;
            animation: toastIn 0.3s ease-out;
            max-width: 90%;
            text-align: center;
        }
        @keyframes toastIn {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* 加载状态 */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #2a2a2a;
            border-top: 2px solid #d45a38;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .status-error {
            color: #b91c1c !important;
            border-color: #b91c1c !important;
        }
        .status-ok {
            color: #4a8a5a !important;
            border-color: #4a8a5a !important;
        }
    </style>
</head>

            "天福麻辣烫", "漫柏烤肉饭", "小湖兰州拉面", "漫泊木桶饭",

        var AVOID_RESTAURANTS = ["寻味江西", "巫山纸包鱼"];

        // ============ 工具函数 ============
        function getTodayStr() {
            return new Date().toISOString().slice(0, 10);
        }

        function getDailySlogan() {
            var today = getTodayStr();
            var seed = 0;
            for (var i = 0; i < today.length; i++) {
                seed += today.charCodeAt(i);
            }
            return SLOGANS[seed % SLOGANS.length];
        }

        function showStatus(msg, isError) {
            var el = document.getElementById("resultStatus");
            if (el) {
                el.innerHTML = msg;
                el.style.color = isError ? '#b91c1c' : '#6a5a4a';
            }
        }

        function showToast(msg) {
            var old = document.querySelector('.toast');
            if (old) old.remove();

            var toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);

            setTimeout(function() {
                if (toast.parentNode) toast.remove();
            }, 2000);
        }

        // ============ 核心逻辑 ============
        function selectRandomPicker(records) {
            var today = getTodayStr();
            var limitDate = new Date();
            limitDate.setDate(limitDate.getDate() - RECENT_DAYS_LIMIT);

            var recent = {};
            for (var i = 0; i < records.length; i++) {
                var d = new Date(records[i].date);
                if (d >= limitDate && records[i].date !== today) {
                    recent[records[i].picker] = true;
                }
            }

            var available = [];
            for (var j = 0; j < PERSONS.length; j++) {
                if (!recent[PERSONS[j]]) available.push(PERSONS[j]);
            }
            if (available.length === 0) available = PERSONS.slice();
            return available[Math.floor(Math.random() * available.length)];
        }

        function selectRestaurant(records, exclude) {
            var today = getTodayStr();
            var limitDate = new Date();
            limitDate.setDate(limitDate.getDate() - RECENT_DAYS_LIMIT);

            var blacklist = {};
            for (var i = 0; i < records.length; i++) {
                var d = new Date(records[i].date);
                if (d >= limitDate && records[i].date !== today && records[i].restaurant) {
                    blacklist[records[i].restaurant] = true;
                }
            }
            if (exclude) blacklist[exclude] = true;

            var available = restaurantList.filter(function(r) { return !blacklist[r]; });
            if (available.length === 0) available = restaurantList.slice();
            if (exclude) {
                available = available.filter(function(r) { return r !== exclude; });
                if (available.length === 0) available = restaurantList.slice();
            }
            return available[Math.floor(Math.random() * available.length)];
        }

        // ============ Supabase 操作 ============
        function fetchAllRecords() {
            return supabaseClient.from('lunch_records').select('*').order('date', { ascending: true })
                .then(function(res) {
                    if (res.error) return [];
                    return res.data.filter(function(r) { return r.restaurant && r.restaurant !== ''; });
                });
        }

        function fetchTodayRecord() {
            return supabaseClient.from('lunch_records').select('*').eq('date', getTodayStr()).maybeSingle()
                .then(function(res) {
                    if (res.error && res.error.code !== 'PGRST116') return null;
                    return res.data;
                });
        }

        function deleteTodayRecord() {
            return supabaseClient.from('lunch_records').delete().eq('date', getTodayStr())
                .then(function(res) { return !res.error; });
        }

        function getTodayPicker() {
            return supabaseClient.from('daily_picker').select('picker').eq('date', getTodayStr()).maybeSingle()
                .then(function(res) {
                    if (res.data) return res.data.picker;
                    return fetchAllRecords().then(function(records) {
                        var picker = selectRandomPicker(records);
                        return supabaseClient.from('daily_picker').insert({ date: getTodayStr(),
                                picker: picker })
                            .then(function(ins) {
                                if (ins.error && ins.error.code === '23505') {
                                    return supabaseClient.from('daily_picker').select('picker')
                                        .eq('date', getTodayStr()).maybeSingle()
                                        .then(function(retry) {
                                            return retry.data ? retry.data.picker : picker;
                                        });
                                }
                                return picker;
                            });
                    });
                });
        }

        function performDraw() {
            if (isDrawing) return Promise.resolve({ success: false, message: "抽选中..." });
            isDrawing = true;

            return fetchTodayRecord().then(function(existing) {
                if (existing && existing.restaurant) {
                    isDrawing = false;
                    return { success: false, alreadyExists: true, picker: existing.picker,
                        restaurant: existing.restaurant };
                }

                return getTodayPicker().then(function(picker) {
                    return fetchAllRecords().then(function(records) {
                        var resto = selectRestaurant(records, null);
                        return supabaseClient.from('lunch_records').upsert({
                            date: getTodayStr(),
                            picker: picker,
                            restaurant: resto
                        }, { onConflict: 'date' }).then(function(res) {
                            isDrawing = false;
                            if (res.error) {
                                showStatus("❌ 抽选失败: " + res.error.message, true);
                                return { success: false, message: res.error.message };
                            }
                            var isAvoid = AVOID_RESTAURANTS.indexOf(resto) !== -1;
                            return { success: true, picker: picker, restaurant: resto,
                                isAvoid: isAvoid };
                        });
                    });
                });
            }).catch(function(err) {
                isDrawing = false;
                showStatus("❌ 异常: " + err.message, true);
                return { success: false, message: err.message };
            });
        }

        function performReDraw() {
            return fetchTodayRecord().then(function(existing) {
                if (!existing || !existing.restaurant) {
                    return { success: false, message: "今日尚无记录" };
                }
                if (AVOID_RESTAURANTS.indexOf(existing.restaurant) === -1) {
                    return { success: false, message: "「" + existing.restaurant + "」不需要重抽" };
                }
                isDrawing = true;
                return deleteTodayRecord().then(function() {
                    return getTodayPicker().then(function(picker) {
                        return supabaseClient.from('lunch_records').insert({ date: getTodayStr(),
                                picker: picker, restaurant: null })
                            .then(function() { return performDraw(); });
                    });
                });
            });
        }

        function deleteRestaurant(name) {
            // 检查今天是否已使用
            fetchTodayRecord().then(function(record) {
                if (record && record.restaurant === name) {
                    showToast('⚠️ 今天已经抽到「' + name + '」，不能删除');
                    return;
                }

                var index = restaurantList.indexOf(name);
                if (index === -1) return;

                if (!confirm('确定要删除「' + name + '」吗？')) return;

                restaurantList.splice(index, 1);
                localStorage.setItem('lunch_restaurants', JSON.stringify(restaurantList));
                renderUI();
                showToast('✅ 已删除「' + name + '」');
            });
        }

        // ============ 渲染 UI ============
        function renderUI() {
            document.getElementById("slogan").textContent = getDailySlogan();

            // 加载餐厅列表
            var saved = localStorage.getItem('lunch_restaurants');
            if (saved) {
                try { restaurantList = JSON.parse(saved); } catch (e) { restaurantList = DEFAULT_RESTAURANTS
                        .slice(); }
            } else {
                restaurantList = DEFAULT_RESTAURANTS.slice();
            }

            getTodayPicker().then(function(picker) {
                todayPicker = picker;
                document.getElementById("pickerNameDisplay").textContent = picker;

                var emojiMap = { '陈鹏': '🧑‍💻', '晨曦': '👩‍💻', '淑静': '👩‍🎤', '王辰': '🧑‍🎤' };
                var descMap = { '陈鹏': '码农', '晨曦': '产品', '淑静': '设计', '王辰': '运营' };
                document.getElementById("pickerGrid").innerHTML = PERSONS.map(function(p) {
                    var active = p === picker ? 'active locked' : '';
                    return '<div class="picker-item ' + active + '">' +
                        '<span class="avatar">' + (emojiMap[p] || '👤') + '</span>' +
                        '<span class="name">' + p + '</span>' +
                        '<span class="badge">' + (p === picker ? '👑 天选' : descMap[p] || '') +
                        '</span></div>';
                }).join('');
            });

            fetchTodayRecord().then(function(record) {
                var grid = document.getElementById("restaurantGrid");
                grid.innerHTML = restaurantList.map(function(r) {
                    var cls = 'restaurant-tag';
                    if (record && record.restaurant === r) cls += ' active';
                    return '<span class="' + cls + '">' +
                        r +
                        '<button class="del-btn" data-name="' + r + '" title="删除">✕</button>' +
                        '</span>';
                }).join('');

                document.querySelectorAll('.restaurant-tag .del-btn').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var name = this.getAttribute('data-name');
                        deleteRestaurant(name);
                    });
                });

                if (record && record.restaurant) {
                    document.getElementById("resultPicker").textContent = record.picker;
                    document.getElementById("resultRestaurant").textContent = record.restaurant;
                    document.getElementById("resultStatus").innerHTML = '✅ 今日已定！天选之人已出手 🎯';
                    document.getElementById("resultStatus").style.color = '#4a8a5a';

                    if (AVOID_RESTAURANTS.indexOf(record.restaurant) !== -1) {
                        document.getElementById("resultStatus").innerHTML = '⚠️ 抽到了「' + record.restaurant +
                            '」可重新抽选 🔄';
                        document.getElementById("resultStatus").style.color = '#d45a38';
                    }
                } else {
                    document.getElementById("resultPicker").textContent = todayPicker || '—';
                    document.getElementById("resultRestaurant").textContent = '⏳ 等待天选之人出手';
                    document.getElementById("resultStatus").innerHTML =
                        '⏳ <span class="blink">正在纠结中</span> ... 其他人请安静 🤫';
                    document.getElementById("resultStatus").style.color = '#6a5a4a';
                }
            });

            fetchAllRecords().then(function(records) {
                var list = document.getElementById("historyList");
                if (!records || records.length === 0) {
                    list.innerHTML = '<div class="history-empty">🍃 暂无干饭记录</div>';
                    return;
                }
                var today = getTodayStr();
                var reversed = records.slice().reverse();
                list.innerHTML = reversed.map(function(r) {
                    var isToday = r.date === today;
                    var d = new Date(r.date);
                    var displayDate = (d.getMonth() + 1) + '/' + d.getDate();
                    return '<div class="history-item">' +
                        '<span class="date">' + displayDate + '</span>' +
                        '<span class="info">👤 <span class="picker">' + r.picker +
                        '</span> → 🍚 <span class="resto">' + r.restaurant + '</span></span>' +
                        (isToday ? '<span class="today-badge">🔥 今日</span>' : '') +
                        '</div>';
                }).join('');
            });
        }

        // ============ 事件绑定 ============
        function bindEvents() {
            document.getElementById("fateBtn").addEventListener("click", function() {
                var btn = this;
                btn.disabled = true;
                btn.innerHTML = '⏳ 命运转动中...';

                performDraw().then(function(result) {
                    btn.disabled = false;
                    btn.innerHTML =
                        '🔮 决定命运<span class="sub-text"><span class="emoji">🤯</span> 点击后不能反悔 <span class="emoji">😈</span></span>';

                    if (!result.success && result.alreadyExists) {
                        renderUI();
                        alert('⛔ 今日已定！\n天选之人：' + result.picker + '\n干饭地点：' + result
                            .restaurant);
                        return;
                    }
                    if (result.success) {
                        renderUI();
                        if (result.isAvoid) {
                            alert('⚠️ 抽到了「' + result.restaurant + '」\n\n点击「决定命运」重新抽选！');
                        } else {
                            alert('🍢 天命已定！\n天选之人：' + result.picker + '\n干饭地点：' + result
                                .restaurant);
                        }
                    } else {
                        alert('❌ 抽选失败: ' + (result.message || "未知错误"));
                    }
                });
            });

            document.getElementById("addRestaurantBtn").addEventListener("click", function() {
                var input = document.getElementById("restaurantInput");
                var name = input.value.trim();
                if (!name) return;
                if (restaurantList.indexOf(name) !== -1) {
                    showToast('⚠️ 已存在「' + name + '」');
                    return;
                }
                restaurantList.push(name);
                localStorage.setItem('lunch_restaurants', JSON.stringify(restaurantList));
                input.value = '';
                renderUI();
                showToast('✅ 已添加「' + name + '」');
            });

            document.getElementById("restaurantInput").addEventListener("keydown", function(e) {
                if (e.key === 'Enter') document.getElementById("addRestaurantBtn").click();
            });

            document.getElementById("clearHistoryBtn").addEventListener("click", function() {
                if (!confirm('⚠️ 确定清空所有记录？')) return;
                supabaseClient.from('lunch_records').delete().neq('id', 0).then(function() {
                    supabaseClient.from('daily_picker').delete().eq('date', getTodayStr())
                        .then(function() { renderUI();
                            showToast('✅ 已清空'); });
                });
            });
        }

        function subscribeToChanges() {
            var channel = supabaseClient.channel('lunch_sync')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'lunch_records' },
                function() { renderUI(); })
                .subscribe();
            return channel;
        }

        // ============ 初始化 ============
        function initApp() {
            if (isInitialized) return;
            if (typeof window.supabase === 'undefined') {
                showStatus('⏳ 加载 Supabase 库...', false);
                setTimeout(initApp, 300);
                return;
            }

            isInitialized = true;
            showStatus('🔗 连接云端...', false);

            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                // 测试连接
                supabaseClient.from('lunch_records').select('count', { count: 'exact', head: true })
                    .then(function(res) {
                        if (res.error) {
                            showStatus('⚠️ 表异常: ' + res.error.message + '，请确认已创建表', true);
                        } else {
                            showStatus('✅ 云端连接成功', false);
                        }
                    });

                renderUI();
                subscribeToChanges();
                bindEvents();

            } catch (err) {
                console.error("初始化失败:", err);
                showStatus("❌ 初始化失败: " + err.message, true);
            }
        }

        // ============ 启动 ============
        if (typeof window.supabase !== 'undefined') {
            initApp();
        } else {
            var script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
            script.onload = function() { initApp(); };
            script.onerror = function() {
                showStatus("❌ 无法加载 Supabase 库，请检查网络", true);
            };
            document.head.appendChild(script);
        }
    </script>
</body>

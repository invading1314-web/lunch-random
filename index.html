<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共享午餐抽签｜云端同步防作弊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", system-ui, sans-serif;
        }
        body {
            background: #f0f4f8;
            padding: 30px 15px;
        }
        .wrap {
            max-width: 520px;
            margin: 0 auto;
            background: #fff;
            border-radius: 18px;
            padding: 35px 25px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        h1 {
            text-align: center;
            color: #2d3748;
            font-size: 24px;
            margin-bottom: 24px;
        }
        .step-box {
            margin-bottom: 22px;
        }
        .step-title {
            font-size: 16px;
            color: #475569;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .result-card {
            border: 2px dashed #cbd5e0;
            border-radius: 14px;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin-bottom: 14px;
        }
        #personShow {
            font-size: 26px;
            font-weight: 700;
            color: #2563eb;
            text-align: center;
        }
        #shopShow {
            font-size: 28px;
            font-weight: 700;
            color: #dc2626;
            text-align: center;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 130px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.85;
        }
        #pickPersonBtn {
            background: #2563eb;
            color: #fff;
        }
        #pickShopBtn {
            background: #059669;
            color: #fff;
        }
        .log-title {
            font-size: 18px;
            color: #374151;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e5e7eb;
        }
        .log-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .log-item {
            padding: 9px 0;
            border-bottom: 1px solid #f3f4f6;
            color: #4b5563;
        }
        .tip-text {
            margin-top: 18px;
            font-size: 13px;
            color: #78716c;
            line-height: 1.6;
        }
        .forceTip {
            margin-top: 22px;
            text-align: center;
            font-size: 17px;
            color: #dc2626;
            font-weight: bold;
        }
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>共享午餐抽签（云端同步·每日仅一次）</h1>
        <div class="loading" id="loadingTip">正在加载云端共享数据...</div>

        <!-- 第一步：抽取负责人 -->
        <div class="step-box" id="stepPerson" style="display:none">
            <div class="step-title">第一步：今日选餐负责人（仅过滤昨天的人，不会连续重复）</div>
            <div class="result-card">
                <div id="personShow">等待云端数据加载</div>
            </div>
            <button id="pickPersonBtn">抽取今日负责人</button>
        </div>

        <!-- 第二步：抽取午餐店铺 -->
        <div class="step-box" id="stepShop" style="display:none">
            <div class="step-title">第二步：由选中负责人抽取午餐（近7天不重复店铺）</div>
            <div class="result-card">
                <div id="shopShow">先抽取负责人，再点选店按钮</div>
            </div>
            <div class="btn-group">
                <button id="pickShopBtn" disabled>抽取午餐店铺</button>
                <!-- 已移除清空记录按钮，无法删除数据 -->
            </div>
        </div>

        <div class="log-title">全局共享干饭记录（所有人统一）</div>
        <div class="log-list" id="logBox"></div>

        <div class="tip-text">
            ✨ 全局规则：
            1.选人规则：只会过滤前一天的负责人，保证不会连续两天同一个人，剩余3人随机抽取；
            2.店铺规则：近7天吃过的餐厅不再抽取；
            3.防作弊：全天全局仅能完整抽签1次，一旦生成结果，所有人无法重新抽取；
            4.数据云端统一存储，所有人打开页面看到完全一致的记录；
            5.无清空功能，历史记录永久保存不可删除。
        </div>
        <div class="forceTip">抽到不想吃的，含泪也要吃！</div>
    </div>

    <script>
        // ===================== 请修改这里的配置 =====================
        const JSONBIN_API_KEY = "$2a$10$ibmL3c3w59DTNibRi5NC2uuth8/Wre0Pj76fh8/SbcMN09YV3Peiq";
        const JSONBIN_ID = "6a30dd3df5f4af5e29f93ba5";
        // ==========================================================

        // 选人名单
        const personList = ["陈鹏", "晨曦", "淑静", "王辰"];
        // 全部午餐店铺
        const allShopList = [
            "漫柏沙县",
            "妯娌",
            "KFC",
            "正记",
            "忆面记",
            "锦海鸡公煲",
            "锦海陕西面馆",
            "锦海锅贴",
            "胖妹",
            "漫柏猪脚饭",
            "三江沙县",
            "天福麻辣烫",
            "漫柏烤肉饭",
            "小湖兰州拉面",
            "漫泊木桶饭",
            "漫泊麻辣香锅",
            "三江烩面",
            "巫山纸包鱼",
            "寻味江西",
            "王家食堂",
            "麦当劳",
            "捡角"
        ];

        const personShow = document.getElementById('personShow');
        const shopShow = document.getElementById('shopShow');
        const pickPersonBtn = document.getElementById('pickPersonBtn');
        const pickShopBtn = document.getElementById('pickShopBtn');
        const logBox = document.getElementById('logBox');
        const loadingTip = document.getElementById('loadingTip');
        const stepPerson = document.getElementById('stepPerson');
        const stepShop = document.getElementById('stepShop');

        let selectedPerson = "";
        let globalRecord = {};

        // 获取今日日期字符串 YYYY-MM-DD
        function getTodayStr() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        // 获取昨日日期字符串
        function getYesterdayStr() {
            const d = new Date();
            const yesterday = new Date(d.getTime() - 24 * 3600 * 1000);
            return `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
        }

        // 从云端读取共享记录
        async function fetchCloudRecord() {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`, {
                headers: {
                    "X-Master-Key": JSONBIN_API_KEY
                }
            });
            const data = await res.json();
            globalRecord = data.record || {};
            renderPage();
        }

        // 保存记录到云端公共库
        async function saveCloudRecord() {
            await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`, {
                method: "PUT",
                headers: {
                    "X-Master-Key": JSONBIN_API_KEY,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ record: globalRecord })
            });
        }

        // 渲染页面状态
        function renderPage() {
            loadingTip.style.display = "none";
            stepPerson.style.display = "block";
            stepShop.style.display = "block";
            const today = getTodayStr();
            // 今日已有全局结果，锁定全部按钮
            if (globalRecord[today]) {
                const todayData = globalRecord[today];
                selectedPerson = todayData.person;
                personShow.innerText = `🎯 今日选餐负责人：${selectedPerson}`;
                shopShow.innerText = `✅ 今日午餐：${todayData.shop}`;
                pickPersonBtn.disabled = true;
                pickShopBtn.disabled = true;
                pickPersonBtn.innerText = "今日已完成抽签，不可重复操作";
            }
            renderLog();
        }

        // 渲染历史记录列表
        function renderLog() {
            logBox.innerHTML = '';
            const dateArr = Object.keys(globalRecord).sort().reverse();
            if(dateArr.length === 0) {
                logBox.innerHTML = '<div class="log-item">暂无全局干饭记录</div>';
                return;
            }
            dateArr.forEach(date => {
                const item = document.createElement('div');
                item.className = 'log-item';
                const data = globalRecord[date];
                item.innerText = `${date} | ${data.person} | ${data.shop}`;
                logBox.appendChild(item);
            })
        }

        // 获取昨天的负责人，仅过滤昨日，不限制7天
        function getYesterdayPerson() {
            const yestDay = getYesterdayStr();
            return globalRecord[yestDay] ? globalRecord[yestDay].person : null;
        }

        // 获取近7天吃过的店，过滤不重复选店
        function getRecentEatShop() {
            const today = new Date();
            const eatShopSet = new Set();
            for(let i = 1; i <=7; i++) {
                const checkDay = new Date(today.getTime() - i * 24 * 3600 * 1000);
                const dayStr = `${checkDay.getFullYear()}-${String(checkDay.getMonth()+1).padStart(2,'0')}-${String(checkDay.getDate()).padStart(2,'0')}`;
                if(globalRecord[dayStr]) eatShopSet.add(globalRecord[dayStr].shop);
            }
            return Array.from(eatShopSet);
        }

        // 抽取负责人动画（方案2：仅过滤昨天的人）
        async function runPersonAnimate() {
            const today = getTodayStr();
            if (globalRecord[today]) return;
            pickPersonBtn.disabled = true;
            pickShopBtn.disabled = true;
            let count = 0;
            const timer = setInterval(() => {
                const temp = personList[Math.floor(Math.random() * personList.length)];
                personShow.innerText = temp;
                count++;
                if(count >= 18) {
                    clearInterval(timer);
                    const yestP = getYesterdayPerson();
                    let canPick = personList;
                    if(yestP) {
                        canPick = personList.filter(p => p !== yestP);
                    }
                    selectedPerson = canPick[Math.floor(Math.random() * canPick.length)];
                    personShow.innerText = `🎯 今日选餐负责人：${selectedPerson}`;
                    pickShopBtn.disabled = false;
                }
            }, 80);
        }

        // 抽取店铺动画，生成全局永久记录
        async function runShopAnimate() {
            if(!selectedPerson) return;
            const today = getTodayStr();
            if (globalRecord[today]) return;
            pickShopBtn.disabled = true;
            let count = 0;
            const timer = setInterval(() => {
                const temp = allShopList[Math.floor(Math.random() * allShopList.length)];
                shopShow.innerText = temp;
                count++;
                if(count >= 22) {
                    clearInterval(timer);
                    const recentEat = getRecentEatShop();
                    let canChoose = allShopList.filter(shop => !recentEat.includes(shop));
                    if(canChoose.length === 0) canChoose = allShopList;
                    const finalShop = canChoose[Math.floor(Math.random() * canChoose.length)];
                    shopShow.innerText = `✅ 今日午餐：${finalShop}`;
                    // 写入全局云端记录，永久锁定
                    globalRecord[today] = {
                        person: selectedPerson,
                        shop: finalShop
                    };
                    await saveCloudRecord();
                    pickPersonBtn.disabled = true;
                    pickShopBtn.disabled = true;
                    pickPersonBtn.innerText = "今日已完成抽签，不可重复操作";
                    renderLog();
                }
            }, 70);
        }

        pickPersonBtn.addEventListener('click', runPersonAnimate);
        pickShopBtn.addEventListener('click', runShopAnimate);

        // 页面加载自动拉取云端同步数据
        window.onload = fetchCloudRecord;
        // 定时自动刷新同步，保证多人实时更新
        setInterval(fetchCloudRecord, 10000);
    </script>
</body>
</html>
